version: "3"
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_PASSWORD: ${dbPassword}
      POSTGRES_USER: user
      POSTGRES_DB: dockerTest
    volumes:
      - db_data:/var/lib/postgresql/data
  app:
    build: .
    ports:
      - 3000:3000
    depends_on:
      - db
volumes:
  db_data:
